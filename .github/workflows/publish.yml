name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC token for NuGet trusted publishing
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # MinVer needs full history + tags to derive the version

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # Test only the library + test projects; the docs project needs a preview SDK and
      # has no bearing on the package. Snapshot tests self-seed their baselines on the
      # fresh runner (first run writes Approved/ and passes).
      - name: Test
        run: dotnet test tests/Ashcroft.Tests/Ashcroft.Tests.csproj -c Release

      # No --no-build here: MinVer sets the package version through a build-time target, and
      # `dotnet pack --no-build` skips it (falling back to 1.0.0). Pack runs an incremental build
      # so the tag-derived version is applied.
      - name: Pack
        run: dotnet pack src/Ashcroft/Ashcroft.csproj -c Release -o ${{ github.workspace }}/nupkg

      - name: NuGet login (trusted publishing -> short-lived API key)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}   # nuget.org profile name (NOT email)

      - name: Push to NuGet.org
        run: >
          dotnet nuget push "${{ github.workspace }}/nupkg/*.nupkg"
          --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
